<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Superadmin - BISU Interview System</title>
  <link rel="icon" type="image/png" href="../assets/Bohol_Island_State_University.png" />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body class="superadmin-page">
<header class="site-header">
  <div class="container container-full">
    <a class="brand" href="../index.html">
      <div class="brand-logo"><img src="../assets/Bohol_Island_State_University.png" alt="BISU logo" /></div>
      <div class="brand-text">
        <span class="brand-name">BISU Clarin</span>
        <span class="brand-sub">Superadmin Console</span>
      </div>
    </a>
    <div class="flex items-center gap-12">
      <span id="super-name-badge" style="font-size:0.82rem;color:rgba(255,255,255,0.7);"></span>
      <button class="btn btn-secondary btn-sm" id="logout-btn">Logout</button>
    </div>
  </div>
</header>
<main class="admin-shell">
  <div class="container container-full" id="loading-view">
    <p style="color:rgba(255,255,255,0.6);text-align:center;">Checking your session...</p>
  </div>

  <div class="container container-full" id="super-view" style="display:none;">
    <div class="admin-grid" style="grid-template-columns: minmax(320px, 24%) minmax(0, 76%); gap: 24px;">

      <div class="admin-card">
        <h3 style="margin-bottom:4px;">Create Admin (Instructor) Account</h3>
        <p style="color:rgba(255,255,255,0.55);font-size:0.82rem;margin-bottom:16px;">
          Creates a real login for an instructor. Only accounts created here can access the Admin Dashboard.
        </p>
        <input id="new-admin-name" type="text" placeholder="Full Name" />
        <input id="new-admin-email" type="email" placeholder="Instructor Email" />
        <input id="new-admin-password" type="password" placeholder="Temporary Password (6+ chars)" />
        <label style="display:block;margin:12px 0 6px;font-size:0.82rem;color:rgba(255,255,255,0.7);">Department</label>
        <select id="new-admin-program">
          <option value="">Select Department</option>
          <option>Bachelor of Science in Computer Science (BSCS)</option>
          <option>Bachelor of Science in Environmental Science (BSES)</option>
          <option>Bachelor of Science in Hospitality Management (BSHM)</option>
        </select>
        <input id="new-admin-section" type="text" placeholder="Section" />
        <button class="btn btn-primary btn-lg" id="create-admin-btn" style="margin-top:8px;">Create Admin Account</button>
        <p id="create-admin-message" style="margin-top:12px;font-size:0.85rem;"></p>

        <h4 style="margin:24px 0 10px;">Existing Admins</h4>
        <div id="admins-list"></div>

        <div id="admin-edit-panel" style="display:none;margin-top:16px;padding:16px;border:1px solid rgba(255,255,255,0.12);border-radius:14px;">
          <h4 style="margin:0 0 12px;">Edit Admin Account</h4>
          <input id="edit-admin-name" type="text" placeholder="Full Name" />
          <input id="edit-admin-email" type="email" placeholder="Instructor Email" />
          <label style="display:block;margin:12px 0 6px;font-size:0.82rem;color:rgba(255,255,255,0.7);">Department</label>
          <select id="edit-admin-program">
            <option value="">Select Department</option>
            <option>Bachelor of Science in Computer Science (BSCS)</option>
            <option>Bachelor of Science in Environmental Science (BSES)</option>
            <option>Bachelor of Science in Hospitality Management (BSHM)</option>
          </select>
          <input id="edit-admin-section" type="text" placeholder="Section" />
          <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:10px;">
            <button class="btn btn-primary btn-sm" id="save-admin-btn">Save Changes</button>
            <button class="btn btn-danger btn-sm" id="delete-admin-btn">Delete Admin</button>
            <button class="btn btn-secondary btn-sm" id="cancel-admin-edit-btn">Cancel</button>
          </div>
          <p id="edit-admin-message" style="margin-top:10px;font-size:0.85rem;"></p>
        </div>
      </div>

      <div class="admin-card" style="display:flex;flex-direction:column;justify-content:space-between;">
        <div>
          <h3 style="margin-bottom:4px;">All Registered Students</h3>
          <p style="color:rgba(255,255,255,0.55);font-size:0.82rem;margin-bottom:16px;">Read-only overview across all programs.</p>
          <div id="students-list"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<script type="module">
  import {
    auth, db, functions,
    onAuthStateChanged, signOut,
    getUserProfile,
    collection, query, where, getDocs, addDoc, serverTimestamp,
    httpsCallable
  } from "../js/firebase-config.js";

  const $ = id => document.getElementById(id);
  let adminList = [];
  let editingAdminUid = null;

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "auth.html"; return; }
    const profile = await getUserProfile(user.uid);
    if (!profile || profile.role !== "superadmin") {
      window.location.href = "auth.html";
      return;
    }
    $("super-name-badge").textContent = profile.name || profile.email || "";
    $("loading-view").style.display = "none";
    $("super-view").style.display = "block";
    await Promise.all([loadAdmins(), loadOrgs(), loadStudents()]);
  });

  $("logout-btn").addEventListener("click", async () => {
    await signOut(auth);
    window.location.href = "auth.html";
  });

  $("create-admin-btn").addEventListener("click", async () => {
    const name = $("new-admin-name").value.trim();
    const email = $("new-admin-email").value.trim();
    const password = $("new-admin-password").value;
    const program = $("new-admin-program").value;
    const section = $("new-admin-section").value.trim();
    const msg = $("create-admin-message");

    if (!name || !email || !password || !program || !section) {
      msg.style.color = "#ffb3b3";
      msg.textContent = "Fill in name, email, password, department, and section.";
      return;
    }

    msg.style.color = "rgba(255,255,255,0.6)";
    msg.textContent = "Creating account...";

    try {
      const createAdminAccount = httpsCallable(functions, "createAdminAccount");
      await createAdminAccount({ name, email, password, program, section });
      msg.style.color = "#9be3c9";
      msg.textContent = `Admin account created for ${email}. Share the temporary password securely — they should change it on first login.`;
      $("new-admin-name").value = "";
      $("new-admin-email").value = "";
      $("new-admin-password").value = "";
      $("new-admin-program").value = "";
      $("new-admin-section").value = "";
      await loadAdmins();
    } catch (err) {
      msg.style.color = "#ffb3b3";
      msg.textContent = err.message || "Failed to create admin account.";
    }
  });

  $("save-admin-btn").addEventListener("click", async () => {
    if (!editingAdminUid) return;
    const name = $("edit-admin-name").value.trim();
    const email = $("edit-admin-email").value.trim();
    const program = $("edit-admin-program").value;
    const section = $("edit-admin-section").value.trim();
    const msg = $("edit-admin-message");

    if (!name || !email || !program || !section) {
      msg.style.color = "#ffb3b3";
      msg.textContent = "Fill in name, email, department, and section.";
      return;
    }

    msg.style.color = "rgba(255,255,255,0.6)";
    msg.textContent = "Saving changes...";

    try {
      const updateAdminAccount = httpsCallable(functions, "updateAdminAccount");
      await updateAdminAccount({ uid: editingAdminUid, name, email, program, section });
      msg.style.color = "#9be3c9";
      msg.textContent = "Admin account updated successfully.";
      await loadAdmins();
      hideAdminEditPanel();
    } catch (err) {
      msg.style.color = "#ffb3b3";
      msg.textContent = err.message || "Failed to update admin account.";
    }
  });

  $("delete-admin-btn").addEventListener("click", async () => {
    if (!editingAdminUid) return;
    if (!confirm("Delete this admin account? This will remove their access permanently.")) return;
    const msg = $("edit-admin-message");
    msg.style.color = "rgba(255,255,255,0.6)";
    msg.textContent = "Deleting admin...";

    try {
      const deleteAdminAccount = httpsCallable(functions, "deleteAdminAccount");
      await deleteAdminAccount({ uid: editingAdminUid });
      msg.style.color = "#9be3c9";
      msg.textContent = "Admin account deleted.";
      await loadAdmins();
      hideAdminEditPanel();
    } catch (err) {
      msg.style.color = "#ffb3b3";
      msg.textContent = err.message || "Failed to delete admin account.";
    }
  });

  $("cancel-admin-edit-btn").addEventListener("click", () => {
    hideAdminEditPanel();
  });

  async function loadAdmins() {
    const q = query(collection(db, "users"), where("role", "==", "admin"));
    const snap = await getDocs(q);
    const list = $("admins-list");
    if (snap.empty) {
      list.innerHTML = '<div style="padding:10px 0;color:rgba(255,255,255,0.5);font-size:0.85rem;">No instructor admins yet.</div>';
      adminList = [];
      hideAdminEditPanel();
      return;
    }
    adminList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    list.innerHTML = adminList.map(a => `
      <div class="detail-item" style="margin-bottom:10px;display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap;">
        <div style="min-width:0;">
          <strong>${escapeHtml(a.name || "Unnamed")}</strong><br/>
          <span style="color:rgba(255,255,255,0.6);font-size:0.82rem;">${escapeHtml(a.email || "")}</span><br/>
          <span style="color:rgba(255,255,255,0.55);font-size:0.8rem;">${escapeHtml(a.program || "No department")}${a.section ? ` • ${escapeHtml(a.section)}` : ""}</span>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn btn-secondary btn-sm admin-action-btn" data-action="edit" data-uid="${a.id}">Edit</button>
          <button class="btn btn-danger btn-sm admin-action-btn" data-action="delete" data-uid="${a.id}">Delete</button>
        </div>
      </div>`).join("");

    list.querySelectorAll(".admin-action-btn").forEach(btn => {
      btn.addEventListener("click", (event) => {
        const uid = event.currentTarget.dataset.uid;
        const action = event.currentTarget.dataset.action;
        if (action === "edit") beginEditAdmin(uid);
        else if (action === "delete") confirmDeleteAdmin(uid);
      });
    });
  }

  function beginEditAdmin(uid) {
    const admin = adminList.find(item => item.id === uid);
    if (!admin) return;
    editingAdminUid = uid;
    $("edit-admin-name").value = admin.name || "";
    $("edit-admin-email").value = admin.email || "";
    $("edit-admin-program").value = admin.program || "";
    $("edit-admin-section").value = admin.section || "";
    $("edit-admin-message").textContent = "";
    $("admin-edit-panel").style.display = "block";
  }

  function hideAdminEditPanel() {
    editingAdminUid = null;
    $("admin-edit-panel").style.display = "none";
  }

  async function confirmDeleteAdmin(uid) {
    if (!confirm("Delete this admin account? This will remove their access permanently.")) return;
    const msg = $("edit-admin-message");
    msg.style.color = "rgba(255,255,255,0.6)";
    msg.textContent = "Deleting admin...";
    try {
      const deleteAdminAccount = httpsCallable(functions, "deleteAdminAccount");
      await deleteAdminAccount({ uid });
      msg.style.color = "#9be3c9";
      msg.textContent = "Admin account deleted.";
      await loadAdmins();
      hideAdminEditPanel();
    } catch (err) {
      msg.style.color = "#ffb3b3";
      msg.textContent = err.message || "Failed to delete admin account.";
    }
  }

  // ---- Organizations ----
  $("create-org-btn").addEventListener("click", async () => {
    const name = $("new-org-name").value.trim();
    const msg = $("create-org-message");
    if (!name) {
      msg.style.color = "#ffb3b3";
      msg.textContent = "Enter an organization name.";
      return;
    }
    try {
      await addDoc(collection(db, "orgs"), { name, createdAt: serverTimestamp() });
      $("new-org-name").value = "";
      msg.style.color = "#9be3c9";
      msg.textContent = "Organization added.";
      await loadOrgs();
    } catch (err) {
      msg.style.color = "#ffb3b3";
      msg.textContent = "Failed to add organization.";
    }
  });

  async function loadOrgs() {
    const snap = await getDocs(collection(db, "orgs"));
    const list = $("orgs-list");
    if (snap.empty) {
      list.innerHTML = '<div style="padding:10px 0;color:rgba(255,255,255,0.5);font-size:0.85rem;">No organizations added yet.</div>';
      return;
    }
    list.innerHTML = snap.docs.map(d => `
      <div class="detail-item" style="margin-bottom:8px;">${escapeHtml(d.data().name || "Unnamed org")}</div>
    `).join("");
  }

  async function loadStudents() {
    const q = query(collection(db, "users"), where("role", "==", "student"));
    const snap = await getDocs(q);
    const list = $("students-list");
    if (snap.empty) {
      list.innerHTML = '<div style="padding:10px 0;color:rgba(255,255,255,0.5);font-size:0.85rem;">No students registered yet.</div>';
      return;
    }
    list.innerHTML = snap.docs.map(d => {
      const s = d.data();
      return `<div class="detail-item" style="margin-bottom:8px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;">
        <span><strong>${escapeHtml(s.firstName || "")} ${escapeHtml(s.lastName || "")}</strong> — ${escapeHtml(s.program || "No program")}</span>
        <span style="color:rgba(255,255,255,0.55);font-size:0.8rem;">${escapeHtml(s.studentId || "")}</span>
      </div>`;
    }).join("");
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }
</script>
</body>
</html>
