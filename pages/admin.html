<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - BISU Interview System</title>
  <link rel="icon" type="image/png" href="../assets/Bohol_Island_State_University.png" />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body>
<header class="site-header">
  <div class="container">
    <a class="brand" href="../index.html">
      <div class="brand-logo"><img src="../assets/Bohol_Island_State_University.png" alt="BISU logo" /></div>
      <div class="brand-text">
        <span class="brand-name">BISU Clarin</span>
        <span class="brand-sub">Admin Dashboard</span>
      </div>
    </a>
    <div class="flex items-center gap-12">
      <span id="admin-name-badge" style="font-size:0.82rem;color:rgba(255,255,255,0.7);"></span>
      <div class="header-badge">ADMIN ACCESS</div>
    </div>
  </div>
</header>
<main class="admin-shell">
  <div class="container" id="loading-view">
    <p style="color:rgba(255,255,255,0.6);text-align:center;">Checking your session...</p>
  </div>

  <div class="container" id="admin-view" style="display:none;">
    <div class="admin-grid">
      <div class="admin-list-card">
        <div class="admin-list-header">
          <h3 style="margin:0;">Student Results</h3>
          <p style="margin:6px 0 0;color:rgba(255,255,255,0.55);font-size:0.82rem;">Select a student to review their final interview outcome.</p>
        </div>
        <div id="results-list"></div>
      </div>
      <div class="admin-detail-card" id="detail-panel">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">
          <div>
            <h3 style="margin:0;">Student Overview</h3>
            <p style="margin:4px 0 0;color:rgba(255,255,255,0.6);font-size:0.82rem;">Choose a result from the left to view the interview summary.</p>
          </div>
          <button class="btn btn-secondary" id="logout-btn">Logout</button>
        </div>
        <div id="detail-content" style="margin-top:16px;"></div>
      </div>
    </div>
  </div>
</main>

<script type="module">
  import {
    auth, db,
    onAuthStateChanged, signOut,
    getUserProfile,
    collection, query, where, getDocs
  } from "../firebase/firebase-config.js";

  const $ = id => document.getElementById(id);
  let results = [];

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "auth.html"; return; }
    const profile = await getUserProfile(user.uid);
    if (!profile || (profile.role !== "admin" && profile.role !== "superadmin")) {
      window.location.href = "auth.html";
      return;
    }
    $("admin-name-badge").textContent = profile.name || profile.email || "";
    $("loading-view").style.display = "none";
    $("admin-view").style.display = "block";
    await loadResults();
  });

  $("logout-btn").addEventListener("click", async () => {
    await signOut(auth);
    window.location.href = "auth.html";
  });

  async function loadResults() {
    // Security rules let admin/superadmin read every doc in /results.
    const snap = await getDocs(collection(db, "results"));
    results = snap.docs.map(d => ({ id: d.id, ...d.data() }))
      .sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
    renderResults();
    if (results.length) {
      renderDetail(results[0]);
    } else {
      $("detail-content").innerHTML = '<p style="color:rgba(255,255,255,0.6);">No student results have been saved yet.</p>';
    }
  }

  function renderResults() {
    const list = $("results-list");
    if (!results.length) {
      list.innerHTML = '<div style="padding:20px;color:rgba(255,255,255,0.6);">No results available.</div>';
      return;
    }
    list.innerHTML = results.map((item, index) => `
      <div class="result-item ${index === 0 ? "active" : ""}" data-index="${index}">
        <div style="font-weight:700;">${escapeHtml(item.studentName || "Student " + (index + 1))}</div>
        <div class="score-pill">${item.overallScore || 0}%</div>
        <div class="result-meta">
          <span>${escapeHtml(item.program || "Program not specified")}</span>
          <span>${new Date(item.createdAt || Date.now()).toLocaleDateString()}</span>
        </div>
      </div>
    `).join("");
    list.querySelectorAll(".result-item").forEach(el => {
      el.addEventListener("click", () => selectResult(Number(el.dataset.index)));
    });
  }

  function selectResult(index) {
    document.querySelectorAll(".result-item").forEach((item, idx) => item.classList.toggle("active", idx === index));
    renderDetail(results[index]);
  }

  function renderDetail(item) {
    const detail = $("detail-content");
    const responseSummary = (item.answers || []).map((entry, idx) => `
      <div class="detail-item">
        <strong>Q${idx + 1}:</strong> ${escapeHtml(entry.question)}
        <div class="answer-block">${escapeHtml(entry.answer || "No answer recorded.")}</div>
      </div>
    `).join("");

    detail.innerHTML = `
      <h4 style="margin:0 0 8px;">${escapeHtml(item.studentName || "Student")}</h4>
      <p style="margin:0 0 16px;color:rgba(255,255,255,0.65);">${escapeHtml(item.program || "Program not specified")}</p>
      <div class="detail-list">
        <div class="detail-item"><strong>Overall Result:</strong> ${item.overallScore || 0}%</div>
        <div class="detail-item"><strong>Recommended Job:</strong> ${escapeHtml(item.recommendedJob || "Not available")}</div>
        <div class="detail-item"><strong>Key Strengths:</strong> ${escapeHtml((item.strengths || []).join(", ") || "None listed")}</div>
        <div class="detail-item"><strong>Areas to Improve:</strong> ${escapeHtml((item.improvements || []).join(", ") || "None listed")}</div>
        <div class="detail-item"><strong>Interview Summary:</strong><div class="answer-block">${escapeHtml(item.summary || "No summary available.")}</div></div>
      </div>
      <div style="margin-top:16px;">
        <h5 style="margin-bottom:8px;">Student Answers</h5>
        ${responseSummary}
      </div>
    `;
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }
</script>
</body>
</html>
