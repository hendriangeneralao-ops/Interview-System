<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bootstrap Accounts - BISU Interview System</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body>
  <main class="auth-shell">
    <div class="container">
      <div class="auth-card">
        <div class="auth-card-head">
          <span class="auth-pill">Setup</span>
          <h1>Create Default Admin Accounts</h1>
          <p>This page creates the default superadmin and admin accounts once.</p>
        </div>
        <button class="btn btn-primary btn-lg btn-full" id="bootstrap-btn">Create Default Accounts</button>
        <p id="bootstrap-message" class="auth-message" style="margin-top:14px;"></p>
      </div>
    </div>
  </main>

  <script type="module">
    import {
      auth,
      db,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      doc,
      setDoc,
      getDoc,
      serverTimestamp
    } from "../js/firebase-config.js";

    const ACCOUNTS = [
      { email: 'superadmin@bisu.edu.ph', password: 'Superadmin123!', role: 'superadmin', name: 'System Superadmin' },
      { email: 'admin@bisu.edu.ph', password: 'Admin123!', role: 'admin', name: 'Instructor Admin' }
    ];

    const btn = document.getElementById('bootstrap-btn');
    const msg = document.getElementById('bootstrap-message');

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      msg.textContent = 'Creating accounts...';
      try {
        for (const account of ACCOUNTS) {
          const email = account.email;
          const password = account.password;
          let userCredential;

          try {
            userCredential = await createUserWithEmailAndPassword(auth, email, password);
          } catch (err) {
            if (err.code === 'auth/email-already-in-use') {
              const signInResult = await signInWithEmailAndPassword(auth, email, password);
              userCredential = signInResult;
            } else {
              throw err;
            }
          }

          const profileRef = doc(db, 'users', userCredential.user.uid);
          const existingProfile = await getDoc(profileRef);

          await setDoc(profileRef, {
            role: account.role,
            name: account.name,
            email,
            createdAt: existingProfile.exists() ? existingProfile.data().createdAt || serverTimestamp() : serverTimestamp()
          }, { merge: true });
        }

        msg.textContent = 'Default accounts created successfully.';
        msg.classList.remove('error');
      } catch (err) {
        console.error(err);
        msg.textContent = err.message || 'Failed to create accounts.';
        msg.classList.add('error');
      } finally {
        btn.disabled = false;
      }
    });
  </script>
  <script src="../js/app-hardening.js"></script>
  <script src="../js/app-hardening.js"></script>
</body>
</html>
