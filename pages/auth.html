<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get Started - BISU Interview System</title>
  <link rel="icon" type="image/png" href="../assets/Bohol_Island_State_University.png" />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body>
<header class="site-header">
  <div class="container">
    <a class="brand" href="../index.html">
      <div class="brand-logo"><img src="../assets/Bohol_Island_State_University.png" alt="BISU logo" /></div>
      <div class="brand-text">
        <span class="brand-name">BISU Clarin</span>
        <span class="brand-sub">Get Started</span>
      </div>
    </a>
    <div class="header-badge">ACCOUNT ACCESS</div>
  </div>
</header>

<main class="auth-shell">
  <div class="container">
    <div class="auth-card">
      <div class="auth-card-head">
        <span class="auth-pill">Student Portal</span>
        <h1>Welcome to BISU Interviews</h1>
        <p>Sign in to continue or create a new account to begin your interview journey.</p>
      </div>

      <div id="login-view" class="auth-view">
        <label class="auth-field">
          <span>BISU Email</span>
          <input id="login-email" type="email" placeholder="name@bisu.edu.ph" autocomplete="email" />
        </label>
        <label class="auth-field">
          <span>Password</span>
          <div class="password-input-wrap">
            <input id="login-password" type="password" placeholder="Enter your password" autocomplete="current-password" />
            <button type="button" class="password-toggle" data-target="login-password" aria-label="Show password">👁</button>
          </div>
        </label>
        <button class="btn btn-primary btn-lg btn-full" id="login-btn">Sign In</button>
        <div class="auth-switch-row">
          <span>New here?</span>
          <a href="#" id="show-register-link">Create account</a>
        </div>
        <p id="login-message" class="auth-message" role="status"></p>
      </div>

      <div id="register-view" class="auth-view" style="display:none;">
        <label class="auth-field">
          <span>First Name</span>
          <input id="reg-firstname" type="text" placeholder="Juan" />
        </label>
        <label class="auth-field">
          <span>Last Name</span>
          <input id="reg-lastname" type="text" placeholder="Dela Cruz" />
        </label>
        <label class="auth-field">
          <span>Middle Initial</span>
          <input id="reg-mi" type="text" placeholder="A" />
        </label>
        <label class="auth-field">
          <span>Student ID</span>
          <input id="reg-student-id" type="text" placeholder="ex: 123456" />
        </label>
        <label class="auth-field">
          <span>Program</span>
          <select id="reg-program">
            <option value="">Select Program</option>
          <option>Bachelor of Science in Computer Science (BSCS)</option>
          <option>Bachelor of Science in Environmental Science (BSES)</option>
          <option>Bachelor of Science in Hospitality Management (BSHM)</option>
          </select>
        </label>
        <label class="auth-field">
          <span>BISU Email</span>
          <input id="reg-email" type="email" placeholder="name@bisu.edu.ph" autocomplete="email" />
        </label>
        <label class="auth-field">
          <span>Password</span>
          <div class="password-input-wrap">
            <input id="reg-password" type="password" placeholder="Minimum 6 characters" autocomplete="new-password" />
            <button type="button" class="password-toggle" data-target="reg-password" aria-label="Show password">👁</button>
          </div>
        </label>
        <label class="auth-field">
          <span>Section</span>
          <input id="reg-section" type="text" placeholder="Section" />
        </label>
        <button class="btn btn-primary btn-lg btn-full" id="register-btn">Create Account</button>
        <div class="auth-switch-row">
          <span>Already registered?</span>
          <a href="#" id="show-login-link">Back to sign in</a>
        </div>
        <p id="register-message" class="auth-message" role="status"></p>
      </div>
    </div>
  </div>
</main>

<script type="module">
  import {
    auth, db,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    doc, setDoc,
    getUserProfile,
    redirectForRole,
    serverTimestamp
  } from "../js/firebase-config.js";

  const $ = id => document.getElementById(id);

  function showView(viewName) {
    const loginView = $('login-view');
    const registerView = $('register-view');
    loginView.style.display = viewName === 'login' ? 'block' : 'none';
    registerView.style.display = viewName === 'register' ? 'block' : 'none';
  }

  $('show-register-link').addEventListener('click', e => {
    e.preventDefault();
    showView('register');
  });
  $('show-login-link').addEventListener('click', e => {
    e.preventDefault();
    showView('login');
  });

  document.querySelectorAll('input, select').forEach(element => {
    element.addEventListener('keydown', event => {
      if (event.key !== 'Enter') return;
      event.preventDefault();
      if (element.id.startsWith('reg-')) registerUser();
      else loginUser();
    });
  });

  document.querySelectorAll('.password-toggle').forEach(button => {
    button.addEventListener('click', () => {
      const input = $(button.dataset.target);
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      button.textContent = isPassword ? '🙈' : '👁';
      button.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
    });
  });

  $('register-btn').addEventListener('click', registerUser);
  $('login-btn').addEventListener('click', loginUser);

  async function registerUser() {
    const firstName = $('reg-firstname').value.trim();
    const lastName = $('reg-lastname').value.trim();
    const middleInitial = $('reg-mi').value.trim();
    const studentId = $('reg-student-id').value.trim();
    const program = $('reg-program').value;
    const email = $('reg-email').value.trim();
    const password = $('reg-password').value;
    const section = $('reg-section').value.trim();
    const msg = $('register-message');

    if (!firstName || !lastName || !studentId || !program || !email || !password) {
      msg.textContent = 'Please complete all required fields.';
      msg.classList.add('error');
      return;
    }
    if (password.length < 6) {
      msg.textContent = 'Password must be at least 6 characters.';
      msg.classList.add('error');
      return;
    }

    msg.classList.remove('error');
    msg.textContent = 'Creating your account...';

    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await setDoc(doc(db, 'users', cred.user.uid), {
        role: 'student',
        firstName, lastName, middleInitial, studentId, program, section,
        email,
        createdAt: serverTimestamp()
      });

      msg.classList.remove('error');
      msg.textContent = 'Registration successful. Redirecting...';
      setTimeout(() => window.location.href = 'student.html', 600);
    } catch (err) {
      msg.classList.add('error');
      console.error('Registration failed:', err);
      msg.textContent = friendlyAuthError(err);
    }
  }

  async function loginUser() {
    const email = $('login-email').value.trim();
    const password = $('login-password').value;
    const msg = $('login-message');

    if (!email || !password) {
      msg.textContent = 'Please enter your email and password.';
      msg.classList.add('error');
      return;
    }

    msg.textContent = 'Signing in...';
    msg.classList.remove('error');

    try {
      const cred = await signInWithEmailAndPassword(auth, email, password);
      const profile = await getUserProfile(cred.user.uid);
      if (!profile) {
        msg.textContent = 'No profile found for this account. Contact an admin.';
        msg.classList.add('error');
        return;
      }
      redirectForRole(profile.role);
    } catch (err) {
      msg.classList.add('error');
      msg.textContent = friendlyAuthError(err);
    }
  }

  function friendlyAuthError(err) {
    const map = {
      'auth/email-already-in-use': 'This email is already registered.',
      'auth/invalid-email': 'That email address looks invalid.',
      'auth/weak-password': 'Password is too weak (min 6 characters).',
      'auth/user-not-found': 'Invalid email or password.',
      'auth/wrong-password': 'Invalid email or password.',
      'auth/invalid-credential': 'Invalid email or password.',
      'permission-denied': 'Account created, but profile storage is blocked by Firestore rules. Please publish the Firestore rules from the project folder.',
      'auth/configuration-not-found': 'Firebase Authentication is not enabled for this project yet. Go to Firebase Console > Authentication > Sign-in method and enable Email/Password.'
    };
    return map[err.code] || (err?.message ? err.message : 'Something went wrong. Please try again.');
  }
</script>
  <script src="../js/app-hardening.js"></script>
  <script src="../js/app-hardening.js"></script>
</body>
</html>
